# Great Docs configuration — https://posit-dev.github.io/great-docs/
# Build: uv run great-docs build · Preview: uv run great-docs preview

module: cc_squash
display_name: cc-squash
parser: google
dynamic: true
repo: https://github.com/yasyf/cc-squash
site_url: "https://yasyf.github.io/cc-squash/"
pypi: true
github_style: widget
jupyter: python3

# Rewrite generated reference titles to pre-parsed pandoc-native Spans so Quarto
# doesn't re-parse the bracketed-span sidebar markup on every page — Pandoc
# backtracks exponentially on __dunder__ emphasis candidates (jgm/pandoc#11687),
# which can push a large API reference's build past an hour. No-op until you add
# a reference: section below. See docs/scripts/native_reference_titles.py.
pre_render:
  - docs/scripts/native_reference_titles.py

# Conservative defaults: a solid navbar and a single accent, no gradient
# presets or hero starfield. The gradient/starfield extras read as busy and the
# starfield canvas intercepts homepage clicks; keep them off unless asked.
navbar_color: "#2a2320"
accent_color: "#e8853a"
dark_mode_toggle: true
back_to_top: true
keyboard_nav: true

# Navbar logo + favicon are auto-detected from docs/assets/logo.png (the
# generated mascot); no logo key is needed here.
hero:
  name: cc-squash
  tagline: "Augmented auto-compaction for long-running Claude Code sessions."

# Narrative doc sections are optional — dynamic mode generates the API reference
# from docstrings without them. Uncomment and point at docs/ dirs as they appear.
# sections:
#   - title: Getting Started
#     dir: docs/getting-started
#     index: true
#   - title: Guide
#     dir: docs/guide
#     navbar_after: Getting Started
#     index: true

cli:
  enabled: true
  module: cc_squash.cli
  name: cli

authors:
  - name: Yasyf Mohamedali
    role: Maintainer
    github: yasyf
    email: yasyfm@gmail.com

# Curated symbol reference (public API only). Optional — without it, dynamic
# mode documents everything in cc_squash.__all__.
# reference:
#   - title: Core
#     desc: The main entry points.
#     contents:
#       - SomePublicClass
#       - some_public_function
