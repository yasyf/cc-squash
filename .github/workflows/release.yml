name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  verify-tag-on-main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: yasyf/homebrew-tap/.github/actions/verify-tag-on-main@19c3d5013032ad9c88f9a8f1170d1f366c19b8d9

  release:
    needs: verify-tag-on-main
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history so the short SHA / ldflags Commit is stable

      - uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          check-latest: true
          cache: true
          cache-dependency-path: go/go.sum

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin, x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates

      - name: Import Developer ID certificate
        uses: yasyf/homebrew-tap/.github/actions/import-developer-id@19c3d5013032ad9c88f9a8f1170d1f366c19b8d9
        with:
          p12: ${{ secrets.MACOS_SIGN_P12 }}
          p12-password: ${{ secrets.MACOS_SIGN_PASSWORD }}
          notary-key: ${{ secrets.MACOS_NOTARY_KEY }}
          notary-key-id: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          notary-issuer-id: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}

      - name: Build universal binaries (Go ccs + Rust ccs-proxy, arm64 + amd64 via lipo)
        run: |
          VERSION="${GITHUB_REF_NAME}"
          COMMIT="$(git rev-parse --short HEAD)"
          LDFLAGS="-s -w -X github.com/yasyf/cc-squash/go/internal/version.Version=${VERSION} -X github.com/yasyf/cc-squash/go/internal/version.Commit=${COMMIT}"
          mkdir -p dist/bin

          # Go control plane (ccs). Pure Go — CGO_ENABLED=0 both slices, then lipo.
          CGO_ENABLED=0 GOARCH=arm64 go -C go build -ldflags "$LDFLAGS" -o "$PWD/dist/ccs-arm64" ./cmd/ccs
          CGO_ENABLED=0 GOARCH=amd64 go -C go build -ldflags "$LDFLAGS" -o "$PWD/dist/ccs-amd64" ./cmd/ccs
          lipo -create -output dist/bin/ccs dist/ccs-arm64 dist/ccs-amd64

          # Rust data plane (ccs-proxy). Build each target, then lipo. rustls/ring
          # links no external dylibs, so the universal Mach-O is self-contained.
          cargo build --release --manifest-path crates/Cargo.toml -p ccs-proxy --target aarch64-apple-darwin
          cargo build --release --manifest-path crates/Cargo.toml -p ccs-proxy --target x86_64-apple-darwin
          lipo -create -output dist/bin/ccs-proxy \
            crates/target/aarch64-apple-darwin/release/ccs-proxy \
            crates/target/x86_64-apple-darwin/release/ccs-proxy

          # Developer ID sign + notarize post-lipo via the shared script from
          # import-developer-id (hardened runtime, notarytool submit retried 3x,
          # hard-fail unless Accepted). The darwin_ prefix on the target arg is
          # load-bearing: on anything else the script silently no-ops and the
          # release ships unsigned. Neither binary needs disable-library-validation
          # — ccs is pure Go, ccs-proxy statically links rustls/ring.
          bash "$MACOS_CODESIGN_SCRIPT" dist/bin/ccs darwin_universal
          bash "$MACOS_CODESIGN_SCRIPT" dist/bin/ccs-proxy darwin_universal

          # Smoke-test the native slices. No version grep for ccs-proxy: clap
          # prints the Cargo workspace version (0.1.0), decoupled from the git tag.
          dist/bin/ccs --version | grep -q "${VERSION}"
          dist/bin/ccs-proxy --version

          # One tarball, both binaries at the tar root (the formula installs both).
          tar -czf "dist/cc-squash-${VERSION}-darwin-universal.tar.gz" -C dist/bin ccs ccs-proxy

      - name: Checksum the release assets
        run: |
          cd dist
          shasum -a 256 -- *.tar.gz > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Export the tarball checksum for the formula render
        id: shas
        run: |
          cd dist
          TARBALL="$(grep -E 'darwin-universal\.tar\.gz$' SHA256SUMS.txt | awk '{print $1}')"
          test -n "$TARBALL"
          echo "tarball=${TARBALL}" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v7
        with:
          name: tarballs
          path: dist/*.tar.gz

      # The formula lives in the shared external tap yasyf/homebrew-tap (it stays
      # a Formula, not a cask, for its `service` block — see the template), so
      # `brew install yasyf/tap/cc-squash` works without a bespoke tap URL.
      # Prerelease tags (v1.2.3-rc.1) publish assets but never touch the tap.
      - name: Render the formula
        if: ${{ !contains(github.ref_name, '-') }}
        uses: yasyf/homebrew-tap/.github/actions/render-formula@19c3d5013032ad9c88f9a8f1170d1f366c19b8d9
        with:
          template: .github/formula/cc-squash.rb.tmpl
          output: Formula/cc-squash.rb
          substitutions: |
            __SHA_TARBALL__=${{ steps.shas.outputs.tarball }}

      - name: Verify the exact rendered formula
        if: ${{ !contains(github.ref_name, '-') }}
        env:
          TARBALL_SHA: ${{ steps.shas.outputs.tarball }}
        run: |
          set -euo pipefail
          formula=tap-staging/Formula/cc-squash.rb
          test -f "$formula"
          ruby -c "$formula"
          brew style "$formula"
          if grep -Eq '__[A-Z0-9_]+__' "$formula"; then
            echo "::error::unfilled template token remains in $formula"
            exit 1
          fi
          grep -Fqx "  url \"https://github.com/yasyf/cc-squash/releases/download/${GITHUB_REF_NAME}/cc-squash-${GITHUB_REF_NAME}-darwin-universal.tar.gz\"" "$formula"
          grep -Fqx "  sha256 \"${TARBALL_SHA}\"" "$formula"

      - name: Upload the verified formula delivery
        if: ${{ !contains(github.ref_name, '-') }}
        uses: actions/upload-artifact@v7
        with:
          name: cc-squash-formula-${{ github.ref_name }}
          path: tap-staging
          if-no-files-found: error

      - name: Record the exact release asset manifest
        run: |
          set -euo pipefail
          archive="dist/cc-squash-${GITHUB_REF_NAME}-darwin-universal.tar.gz"
          test -f "$archive"
          test -f dist/SHA256SUMS.txt
          test "$(wc -l < dist/SHA256SUMS.txt | tr -d ' ')" = 1
          grep -Fq "  $(basename "$archive")" dist/SHA256SUMS.txt
          printf '%s\n' "$archive" dist/SHA256SUMS.txt > "$RUNNER_TEMP/cc-squash-release-assets"

      - name: Stage and verify the complete draft release
        id: draft
        uses: yasyf/homebrew-tap/.github/actions/stage-draft-release@54e3e194bda69896894a82c17fcdb2822beefab5
        with:
          token: ${{ github.token }}
          tag: ${{ github.ref_name }}
          manifest: ${{ runner.temp }}/cc-squash-release-assets
          title: ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, '-') }}

      - name: Smoke-test the exact downloaded release
        env:
          DOWNLOADED: ${{ steps.draft.outputs['download-dir'] }}
        run: |
          set -euo pipefail
          archive="cc-squash-${GITHUB_REF_NAME}-darwin-universal.tar.gz"
          (
            cd "$DOWNLOADED"
            shasum -a 256 -c SHA256SUMS.txt
          )

          contents="$RUNNER_TEMP/archive-contents"
          printf '%s\n' ccs ccs-proxy > "$RUNNER_TEMP/expected-archive-contents"
          tar -tzf "$DOWNLOADED/$archive" | sort > "$contents"
          diff -u "$RUNNER_TEMP/expected-archive-contents" "$contents"

          unpack="$RUNNER_TEMP/downloaded-release-smoke"
          rm -rf "$unpack"
          mkdir -p "$unpack"
          tar -xzf "$DOWNLOADED/$archive" -C "$unpack"
          for binary in ccs ccs-proxy; do
            lipo -verify_arch arm64 x86_64 "$unpack/$binary"
            codesign --verify --strict --verbose=2 "$unpack/$binary"
            actual_team="$(codesign -dvv "$unpack/$binary" 2>&1 | sed -n 's/^TeamIdentifier=//p')"
            test "$actual_team" = "$TEAM_ID"
            spctl --assess --type execute --verbose=4 "$unpack/$binary"
          done
          "$unpack/ccs" --version | grep -Fq "$GITHUB_REF_NAME"
          "$unpack/ccs-proxy" --version

      - name: Publish the verified release
        uses: yasyf/homebrew-tap/.github/actions/publish-draft-release@54e3e194bda69896894a82c17fcdb2822beefab5
        with:
          token: ${{ github.token }}
          release-id: ${{ steps.draft.outputs['release-id'] }}
          tag: ${{ github.ref_name }}
          manifest: ${{ runner.temp }}/cc-squash-release-assets
          prerelease: ${{ contains(github.ref_name, '-') }}
          make-latest: ${{ !contains(github.ref_name, '-') }}

  publish-tap:
    needs: release
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    steps:
      - name: Download the verified formula delivery
        uses: actions/download-artifact@v8
        with:
          name: cc-squash-formula-${{ github.ref_name }}
          path: tap-staging

      - name: Verify the downloaded formula delivery
        run: |
          set -euo pipefail
          formula=tap-staging/Formula/cc-squash.rb
          test -f "$formula"
          test "$(find tap-staging -type f | wc -l | tr -d ' ')" = 1
          ruby -c "$formula"
          grep -Fqx "  url \"https://github.com/yasyf/cc-squash/releases/download/${GITHUB_REF_NAME}/cc-squash-${GITHUB_REF_NAME}-darwin-universal.tar.gz\"" "$formula"
          if grep -Eq '__[A-Z0-9_]+__' "$formula"; then
            echo "::error::unfilled template token remains in $formula"
            exit 1
          fi

      # HOMEBREW_TAP_TOKEN must be a PAT with push access to yasyf/homebrew-tap;
      # the default GITHUB_TOKEN cannot push cross-repo. This separate job is
      # intentionally last so a tap-only failure can rerun without rebuilding
      # timestamp-signed release assets that are already public.
      - name: Publish the formula to the tap
        uses: yasyf/homebrew-tap/.github/actions/publish@19c3d5013032ad9c88f9a8f1170d1f366c19b8d9
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          dir: tap-staging
          message: "cc-squash ${{ github.ref_name }}"
