name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache-dependency-path: go/go.sum

      - name: Format check (gofmt)
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt found unformatted files:"; echo "$unformatted"; exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test (race)
        run: go test -race ./...

  rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates

      - name: Format check
        run: cargo fmt --all --check

      # The fail-open hot-path gate (no .unwrap()/.expect() in relay/forward/
      # synth) is enforced in-source: each hot-path module root carries
      # #![cfg_attr(not(test), deny(clippy::unwrap_used, clippy::expect_used))],
      # so clippy fails the build on a hot-path unwrap while leaving test modules
      # exempt. This is robust where a grep over inline #[cfg(test)] blocks is not.
      - name: Clippy (incl. fail-open deny)
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test --all

  # Two-process cold-start gate: drives the real `ccs` control plane and
  # `ccs-proxy` data plane as separate processes (URL mint, warm reuse,
  # proxy-restart port stability). The test itself builds both binaries (go
  # build + cargo build -p ccs-proxy), so this job just needs both toolchains.
  # Build-tagged `integration`, so the default `go` job never compiles it; this
  # job passes `-tags integration`. Separate from the unit gates so a flaky
  # process-spawning run does not block them, but it runs on every push/PR.
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache-dependency-path: go/go.sum

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates

      - name: Cold-start integration test
        run: scripts/integration-test.sh
