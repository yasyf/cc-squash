name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache-dependency-path: go/go.sum

      - name: Format check (gofmt)
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt found unformatted files:"; echo "$unformatted"; exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test (race)
        run: go test -race ./...

  rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates

      # pingora's tree needs cmake (zlib-ng via flate2) and, on x86_64 Linux,
      # nasm (aws-lc-sys assembly, pulled by rustls 0.23's default crypto provider).
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y cmake nasm

      - name: Format check
        run: cargo fmt --all --check

      # The fail-open hot-path gate (no .unwrap()/.expect() in relay/intercept/
      # synth/demux/auth) is enforced in-source: each hot-path module root carries
      # #![cfg_attr(not(test), deny(clippy::unwrap_used, clippy::expect_used))],
      # so clippy fails the build on a hot-path unwrap while leaving test modules
      # exempt. This is robust where a grep over inline #[cfg(test)] blocks is not.
      - name: Clippy (incl. fail-open deny)
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test --all
