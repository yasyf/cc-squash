name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache-dependency-path: go/go.sum

      - name: Format check (gofmt)
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt found unformatted files:"; echo "$unformatted"; exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test (race)
        run: go test -race ./...

  rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates

      # pingora (added in Phase B) needs these system libs; harmless before then.
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y cmake

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test --all

      - name: Fail-open lint (no .unwrap()/.expect() on the hot path)
        run: |
          hot="ccs-proxy/src/relay ccs-proxy/src/intercept ccs-proxy/src/synth ccs-proxy/src/demux ccs-proxy/src/auth"
          found=0
          for d in $hot; do
            [ -d "$d" ] || continue
            # exclude #[cfg(test)] modules and test files
            matches="$(grep -rnE '\.(unwrap|expect)\(' "$d" --include='*.rs' | grep -vE '/tests?/|_test\.rs' || true)"
            if [ -n "$matches" ]; then
              echo "::error::hot-path .unwrap()/.expect() found (fail-open violation):"; echo "$matches"; found=1
            fi
          done
          exit $found
